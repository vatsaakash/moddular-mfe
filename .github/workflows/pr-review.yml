name: "🤖 PR Review Agent"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: "🔍 Review & Checks"
    runs-on: ubuntu-latest

    steps:
      # ── Setup ─────────────────────────────────────────────
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── Checks ────────────────────────────────────────────
      - name: "🧹 Lint check"
        id: lint
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npm run lint 2>&1)
          EXIT_CODE=$?
          echo "$EXIT_CODE" > /tmp/lint-exit.txt
          echo "$OUTPUT" > /tmp/lint-output.txt
          exit $EXIT_CODE

      - name: "📘 TypeScript check"
        id: typecheck
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npx tsc --noEmit 2>&1)
          EXIT_CODE=$?
          echo "$EXIT_CODE" > /tmp/typecheck-exit.txt
          echo "$OUTPUT" > /tmp/typecheck-output.txt
          exit $EXIT_CODE

      - name: "🏗️ Next.js build check"
        id: build
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(NEXT_PUBLIC_BASE_PATH="/moddular-mfe" npm run build 2>&1)
          EXIT_CODE=$?
          echo "$EXIT_CODE" > /tmp/build-exit.txt
          echo "$OUTPUT" > /tmp/build-output.txt
          exit $EXIT_CODE

      - name: "📚 Storybook build check"
        id: storybook
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npm run build-storybook 2>&1)
          EXIT_CODE=$?
          echo "$EXIT_CODE" > /tmp/storybook-exit.txt
          echo "$OUTPUT" > /tmp/storybook-output.txt
          exit $EXIT_CODE

      # ── Export Results ───────────────────────────────────
      - name: Save PR Number
        if: always()
        run: echo "${{ github.event.pull_request.number }}" > /tmp/pr-number.txt

      - name: Upload PR Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-results
          path: |
            /tmp/pr-number.txt
            /tmp/lint-exit.txt
            /tmp/lint-output.txt
            /tmp/typecheck-exit.txt
            /tmp/typecheck-output.txt
            /tmp/build-exit.txt
            /tmp/build-output.txt
            /tmp/storybook-exit.txt
            /tmp/storybook-output.txt
          retention-days: 1

      # ── Final Status ─────────────────────────────────────
      - name: "Final check status"
        if: always()
        run: |
          LINT=$(cat /tmp/lint-exit.txt || echo "1")
          TYPE=$(cat /tmp/typecheck-exit.txt || echo "1")
          BUILD=$(cat /tmp/build-exit.txt || echo "1")
          STORY=$(cat /tmp/storybook-exit.txt || echo "1")
          if [ "$LINT" -ne 0 ] || [ "$TYPE" -ne 0 ] || [ "$BUILD" -ne 0 ] || [ "$STORY" -ne 0 ]; then
            echo "One or more checks failed."
            exit 1
          fi

