# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/

language: "en-US"

reviews:
  profile: "assertive"
  auto_review:
    enabled: true
    drafts: false
  
  # Global instructions for the AI reviewer
  instructions: |
    You are reviewing 'moddular-mfe', a premium React/Next.js micro-frontend component library. 
    Follow the standards defined in `CONTRIBUTING.md`.

    **Core Review Checklist:**
    1. **Commit Messages**: Verify PR follows Conventional Commits (e.g., `feat(scope): desc`).
    2. **Accessibility (A11y)**: Must follow WAI-ARIA Authoring Practices. Every interaction needs keyboard support and correct `aria-*` attributes (`aria-expanded`, `aria-controls`, etc.).
    3. **File Structure**: New components must have exactly:
       - `ComponentName.tsx` (Component logic)
       - `ComponentName.module.scss` (Styles)
       - `ComponentName.stories.tsx` (Storybook)
       - `index.ts` (Barrel export)
    4. **SCSS Rules**: 
       - ❌ NO hardcoded colors (e.g., `#fff`). Use `var(--color-...)`.
       - ❌ NO magic numbers for spacing/radius. Use `$space-...` and `$radius-...`.
    5. **Storybook**: Ensure every prop is documented in `argTypes` and variant stories are provided.
    6. **ThemeProvider**: Components must respect `theme` and `brand` props.

  # Path-specific overrides
  path_instructions:
    - path: "src/components/**/*.tsx"
      instructions: |
        Check for proper TypeScript typing of props. 
        Ensure `React.memo` or `useMemo` are used only when there is a clear performance benefit.
    
    - path: "src/components/**/*.module.scss"
      instructions: "Check for responsive design using `@include respond-to`. Verify the absence of global leaks."
    
    - path: ".github/workflows/*.yml"
      instructions: "Verify the secure split-workflow pattern for PR scoring (artifacts + separate commenter job)."

chat:
  enabled: true
